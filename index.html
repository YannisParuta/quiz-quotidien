<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Quotidien</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Meta tags pour SEO et partage -->
    <meta name="description" content="Quiz Quotidien - 10 nouvelles questions chaque jour pour tester vos connaissances !">
    <meta property="og:title" content="Quiz Quotidien">
    <meta property="og:description" content="10 nouvelles questions chaque jour pour tester vos connaissances !">
    <meta property="og:image" content="https://quiz-quotidien.fr/favicon.png">
    <meta property="og:url" content="https://quiz-quotidien.fr">
    <meta name="twitter:card" content="summary">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XHE708K9TT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XHE708K9TT');

    <!-- Google AdSense - NE PAS ACTIVER AVANT APPROBATION -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TIMER_DURATION = 30;

        // ─── Helpers ───────────────────────────────────────────────────────────
        const getTodayKey = () => {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        };

        const getYesterdayKey = () => {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        };

        // ─── SVG Icons ─────────────────────────────────────────────────────────
        const Calendar = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const Trophy = () => (
            <svg className="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                <path d="M4 22h16"></path>
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
            </svg>
        );

        const CheckCircle = () => (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const XCircle = () => (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        );

        const AlertCircle = () => (
            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        // ─── Main Component ────────────────────────────────────────────────────
        function DailyQuiz() {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [quizCompleted, setQuizCompleted] = useState(false);
            const [dailyQuiz, setDailyQuiz] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [answers, setAnswers] = useState([]);
            const [quizAlreadyCompleted, setQuizAlreadyCompleted] = useState(false);
            const [timeLeft, setTimeLeft] = useState(TIMER_DURATION);
            const [streak, setStreak] = useState(0);

            const timerRef = useRef(null);
            const answeredRef = useRef(false);

            // ── Load streak on mount ──────────────────────────────────────────
            useEffect(() => {
                try {
                    const stored = JSON.parse(localStorage.getItem('quiz-streak') || '{"streak":0,"lastDate":""}');
                    const today = getTodayKey();
                    const yesterday = getYesterdayKey();
                    if (stored.lastDate === today || stored.lastDate === yesterday) {
                        setStreak(stored.streak);
                    }
                } catch (e) {}
            }, []);

            // ── Timer ─────────────────────────────────────────────────────────
            useEffect(() => {
                // Stop timer when not needed
                if (loading || quizCompleted || showResult || !dailyQuiz.length) {
                    if (timerRef.current) clearInterval(timerRef.current);
                    return;
                }

                // New question: reset
                answeredRef.current = false;
                setTimeLeft(TIMER_DURATION);
                if (timerRef.current) clearInterval(timerRef.current);

                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timerRef.current);
                            if (!answeredRef.current) {
                                answeredRef.current = true;
                                // Use setTimeout to avoid setState-inside-setState
                                setTimeout(() => {
                                    setSelectedAnswer(null);   // null = aucune réponse
                                    setShowResult(true);
                                    setAnswers(a => [...a, null]);
                                }, 0);
                            }
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);

                return () => { if (timerRef.current) clearInterval(timerRef.current); };
            }, [currentQuestion, showResult, quizCompleted, loading, dailyQuiz.length]);

            // ── Check if today's quiz is already done ─────────────────────────
            const checkIfQuizCompleted = () => {
                const dateKey = getTodayKey();
                if (localStorage.getItem(`quiz-completed-${dateKey}`) === 'true') {
                    setQuizAlreadyCompleted(true);
                    const savedScore   = localStorage.getItem(`quiz-score-${dateKey}`);
                    const savedAnswers = localStorage.getItem(`quiz-answers-${dateKey}`);
                    if (savedScore)   setScore(parseInt(savedScore));
                    if (savedAnswers) setAnswers(JSON.parse(savedAnswers));
                    setQuizCompleted(true);
                    return true;
                }
                return false;
            };

            // ── Fetch questions ───────────────────────────────────────────────
            const fetchQuestionsFromJSON = async () => {
                try {
                    setLoading(true);
                    setError(null);
                    checkIfQuizCompleted();

                    const response = await fetch(`/questions.json?v=${Date.now()}`);
                    if (!response.ok) throw new Error('Erreur de chargement des questions');
                    const data = await response.json();

                    if (!data.questions || !Array.isArray(data.questions) || data.questions.length === 0) {
                        throw new Error('Aucune question disponible');
                    }

                    const today = new Date();
                    const year  = today.getFullYear();
                    const month = today.getMonth();      // 0-indexed
                    const day   = today.getDate();       // 1-31
                    const currentVersion = data.version || 1;

                    // Clé de cache stable par jour (sans version → stable toute la journée)
                    const dateKey = `quiz-monthly-${year}-${month + 1}-${day}`;

                    // Try cache
                    try {
                        const cached = localStorage.getItem(dateKey);
                        if (cached) {
                            const cachedData = JSON.parse(cached);
                            if (cachedData.questions?.length === 10 &&
                                cachedData.questions.every(q => q?.question && q?.options && typeof q.correctAnswer !== 'undefined')) {
                                setDailyQuiz(cachedData.questions);
                                setLoading(false);
                                return;
                            }
                            localStorage.removeItem(dateKey);
                        }
                    } catch (e) {}

                    // Clean old caches
                    try {
                        const toRemove = [];
                        for (let i = 0; i < localStorage.length; i++) {
                            const k = localStorage.key(i);
                            if (k?.startsWith('quiz-') && k !== dateKey) toRemove.push(k);
                        }
                        toRemove.forEach(k => localStorage.removeItem(k));
                    } catch (e) {}

                    // ── Sélection mensuelle anti-répétition ──────────────────────
                    // Seed basé sur année+mois → même ordre pour tous les utilisateurs ce mois
                    // Chaque jour du mois reçoit sa propre tranche de 10 questions exclusives
                    const rng = s => { let x = Math.sin(s++) * 10000; return x - Math.floor(x); };
                    const monthSeed = year * 100 + month; // ex: 202603 pour mars 2026
                    const shuffled  = [...data.questions].sort(() => rng(monthSeed) - 0.5);
                    const dayIndex  = (day - 1) % 31;    // 0 pour le 1er, 30 pour le 31

                    let selected;
                    if (shuffled.length >= 310) {
                        // Pool complet : tranche exclusive par jour → 0 répétition dans le mois
                        selected = shuffled.slice(dayIndex * 10, dayIndex * 10 + 10);
                    } else {
                        // Pool pas encore à 310 : sélection aléatoire déterministe (comportement de transition)
                        const fallbackSeed = new Date().setHours(0, 0, 0, 0) + currentVersion * 1000000;
                        const fallbackShuffled = [...data.questions].sort(() => rng(fallbackSeed) - 0.5);
                        selected = fallbackShuffled.slice(0, 10);
                    }

                    try {
                        localStorage.setItem(dateKey, JSON.stringify({ questions: selected, date: today.toISOString(), version: currentVersion }));
                    } catch (e) {}

                    setDailyQuiz(selected);
                    setLoading(false);
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            useEffect(() => { fetchQuestionsFromJSON(); }, []);

            // ── Answer handler ────────────────────────────────────────────────
            const handleAnswerClick = (answerIndex) => {
                if (showResult || answeredRef.current) return;
                answeredRef.current = true;
                if (timerRef.current) clearInterval(timerRef.current);

                setSelectedAnswer(answerIndex);
                setShowResult(true);
                setAnswers(prev => [...prev, answerIndex]);
                if (answerIndex === dailyQuiz[currentQuestion].correctAnswer) {
                    setScore(s => s + 1);
                }
            };

            // ── Next question / finish ────────────────────────────────────────
            const handleNext = () => {
                if (currentQuestion < dailyQuiz.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    setSelectedAnswer(null);
                    setShowResult(false);
                } else {
                    // answers already contains all responses (incl. current)
                    const finalScore = answers.reduce((total, answer, index) => {
                        if (dailyQuiz[index] && answer === dailyQuiz[index].correctAnswer) return total + 1;
                        return total;
                    }, 0);

                    setScore(finalScore);
                    setQuizCompleted(true);

                    const dateKey = getTodayKey();
                    localStorage.setItem(`quiz-completed-${dateKey}`, 'true');
                    localStorage.setItem(`quiz-score-${dateKey}`, finalScore.toString());
                    localStorage.setItem(`quiz-answers-${dateKey}`, JSON.stringify(answers));

                    // Update streak
                    try {
                        const stored = JSON.parse(localStorage.getItem('quiz-streak') || '{"streak":0,"lastDate":""}');
                        const yesterday = getYesterdayKey();
                        const newStreak = stored.lastDate === dateKey ? stored.streak
                            : stored.lastDate === yesterday ? stored.streak + 1
                            : 1;
                        localStorage.setItem('quiz-streak', JSON.stringify({ streak: newStreak, lastDate: dateKey }));
                        setStreak(newStreak);
                    } catch (e) {}
                }
            };

            // ── Share ─────────────────────────────────────────────────────────
            const buildShareText = () => {
                const dateString = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const squares = answers.map((a, i) =>
                    dailyQuiz[i] ? (a === dailyQuiz[i].correctAnswer ? '🟢' : '🔴') : '⚪'
                ).join('');
                const pct = dailyQuiz.length > 0 ? (score / dailyQuiz.length) * 100 : 0;
                const [emoji, comment] = score === dailyQuiz.length ? ['🏆', 'Score parfait !']
                    : pct >= 70 ? ['👏', 'Excellent !']
                    : pct >= 50 ? ['💪', 'Pas mal !']
                    : ['📚', "Continue de t'entraîner !"];
                const streakLine = streak > 1 ? `\n🔥 ${streak} jours de suite !` : '';
                return `🎯 Quiz Quotidien - ${dateString} 🎯\nScore : ${score}/${dailyQuiz.length}\n${squares}\n${emoji} ${comment}${streakLine}\n\nhttps://quiz-quotidien.fr`;
            };

            const shareOnWhatsApp = () => window.open(`https://wa.me/?text=${encodeURIComponent(buildShareText())}`, '_blank');
            const shareOnTwitter  = () => window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(buildShareText())}`, '_blank');

            const shareGeneric = () => {
                const text = buildShareText();
                if (navigator.share) {
                    navigator.share({ title: 'Mon score au Quiz Quotidien', text }).catch(() => {});
                } else {
                    try { navigator.clipboard.writeText(text); alert('✅ Score copié dans le presse-papier !'); }
                    catch {
                        const ta = document.createElement('textarea');
                        ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-999999px';
                        document.body.appendChild(ta); ta.select();
                        try { document.execCommand('copy'); alert('✅ Score copié !'); } catch {}
                        ta.remove();
                    }
                }
            };

            // ── Timer styling ─────────────────────────────────────────────────
            const timerBarColor  = timeLeft > 15 ? 'bg-green-500' : timeLeft > 8 ? 'bg-orange-400' : 'bg-red-500';
            const timerTextColor = timeLeft > 15 ? 'text-green-600' : timeLeft > 8 ? 'text-orange-500' : 'text-red-600 font-bold';

            // ── Loading / Error states ─────────────────────────────────────────
            if (loading) return (
                <div className="min-h-screen bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 text-center">
                        <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-purple-600 mx-auto mb-4"></div>
                        <p className="text-xl text-gray-700 font-medium">Chargement du quiz...</p>
                    </div>
                </div>
            );

            if (error) return (
                <div className="min-h-screen bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center">
                        <div className="text-red-500 mx-auto mb-4 flex justify-center"><AlertCircle /></div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-4">Erreur</h2>
                        <p className="text-gray-600 mb-6">{error}</p>
                        <button onClick={fetchQuestionsFromJSON} className="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-8 rounded-lg">Réessayer</button>
                    </div>
                </div>
            );

            if (!dailyQuiz || dailyQuiz.length === 0) return (
                <div className="min-h-screen bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 text-center">
                        <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-purple-600 mx-auto mb-4"></div>
                        <p className="text-xl text-gray-700 font-medium">Préparation des questions...</p>
                    </div>
                </div>
            );

            // ── Main render ───────────────────────────────────────────────────
            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full p-8">

                        {/* ── Header ── */}
                        <div className="text-center mb-6">
                            <div className="flex items-center justify-center gap-3 flex-wrap mb-2">
                                <div className="flex items-center gap-1 text-purple-600">
                                    <Calendar />
                                    <span className="text-sm font-medium">
                                        {new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                    </span>
                                </div>
                                {streak > 0 && (
                                    <div className="flex items-center gap-1 bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm font-semibold">
                                        🔥 {streak} jour{streak > 1 ? 's' : ''}
                                    </div>
                                )}
                            </div>
                            <h1 className="text-4xl font-bold text-gray-800 mb-1">Quiz Quotidien</h1>
                            <p className="text-gray-500 text-sm">10 nouvelles questions chaque jour !</p>
                        </div>

                        {/* ── Quiz in progress ── */}
                        {!quizCompleted ? (
                            <>
                                {/* Progress bar */}
                                <div className="mb-4">
                                    <div className="flex justify-between text-sm text-gray-600 mb-1">
                                        <span>Question {currentQuestion + 1} sur {dailyQuiz.length}</span>
                                        <span>Score : {score}/{dailyQuiz.length}</span>
                                    </div>
                                    {dailyQuiz[currentQuestion].category && (
                                        <div className="text-xs text-purple-600 mb-2">📚 {dailyQuiz[currentQuestion].category}</div>
                                    )}
                                    <div className="w-full bg-gray-200 rounded-full h-2">
                                        <div className="bg-purple-600 h-2 rounded-full transition-all duration-300"
                                             style={{ width: `${((currentQuestion + 1) / dailyQuiz.length) * 100}%` }} />
                                    </div>
                                </div>

                                {/* Timer */}
                                {!showResult && (
                                    <div className="mb-5">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-xs text-gray-400">Temps restant</span>
                                            <span className={`text-sm ${timerTextColor}`}>{timeLeft}s</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2">
                                            <div className={`h-2 rounded-full transition-all duration-1000 ${timerBarColor}`}
                                                 style={{ width: `${(timeLeft / TIMER_DURATION) * 100}%` }} />
                                        </div>
                                    </div>
                                )}

                                {/* Question + Options */}
                                <div className="mb-6">
                                    <h2 className="text-2xl font-semibold text-gray-800 mb-5">
                                        {dailyQuiz[currentQuestion].question}
                                    </h2>
                                    <div className="space-y-3">
                                        {dailyQuiz[currentQuestion].options.map((option, index) => {
                                            const isCorrect  = index === dailyQuiz[currentQuestion].correctAnswer;
                                            const isSelected = index === selectedAnswer;
                                            let cls = "w-full p-4 text-left rounded-lg border-2 transition-all duration-200 ";
                                            if (!showResult) {
                                                cls += "border-gray-200 hover:border-purple-400 hover:bg-purple-50 cursor-pointer";
                                            } else {
                                                cls += isCorrect  ? "border-green-500 bg-green-50"
                                                     : isSelected ? "border-red-500 bg-red-50"
                                                     :              "border-gray-200 bg-gray-50 cursor-not-allowed";
                                            }
                                            return (
                                                <button key={index} onClick={() => handleAnswerClick(index)}
                                                        className={cls} disabled={showResult}>
                                                    <div className="flex items-center justify-between">
                                                        <span className="font-medium">{option}</span>
                                                        {showResult && isCorrect  && <CheckCircle />}
                                                        {showResult && isSelected && !isCorrect && <XCircle />}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {showResult && selectedAnswer === null && (
                                        <p className="text-center text-orange-500 font-semibold mt-3 text-sm">
                                            ⏱️ Temps écoulé ! La bonne réponse est affichée en vert.
                                        </p>
                                    )}
                                </div>

                                {showResult && (
                                    <button onClick={handleNext}
                                            className="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors">
                                        {currentQuestion < dailyQuiz.length - 1 ? 'Question suivante →' : 'Voir les résultats'}
                                    </button>
                                )}
                            </>

                        ) : (
                        /* ── Results screen ── */
                            <div className="text-center">
                                <div className="text-yellow-500 mx-auto mb-4 flex justify-center"><Trophy /></div>
                                <h2 className="text-3xl font-bold text-gray-800 mb-4">Quiz terminé !</h2>

                                {/* Streak banner (only on fresh completion) */}
                                {streak > 0 && !quizAlreadyCompleted && (
                                    <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 mb-4">
                                        <p className="text-orange-600 font-bold text-lg">
                                            🔥 {streak} jour{streak > 1 ? 's' : ''} de suite !
                                        </p>
                                        <p className="text-orange-500 text-sm">
                                            {streak >= 7 ? "Incroyable série, continue !"
                                             : streak >= 3 ? "Belle série, ne t'arrête pas !"
                                             : "C'est parti pour une belle série !"}
                                        </p>
                                    </div>
                                )}

                                {/* Score */}
                                <div className="bg-purple-100 rounded-xl p-6 mb-6">
                                    <p className="text-5xl font-bold text-purple-600 mb-2">{score}/{dailyQuiz.length}</p>
                                    <p className="text-gray-700">
                                        {score === dailyQuiz.length       ? "Parfait ! Vous êtes un expert !" :
                                         score >= dailyQuiz.length * 0.7  ? "Excellent travail !" :
                                         score >= dailyQuiz.length * 0.5  ? "Pas mal ! Continuez comme ça !" :
                                                                             "Continuez à vous entraîner !"}
                                    </p>
                                </div>

                                <p className="text-gray-500 text-sm mb-6">
                                    {quizAlreadyCompleted
                                        ? "Vous avez déjà fait le quiz aujourd'hui. Revenez demain !"
                                        : "Revenez demain pour de nouvelles questions !"}
                                </p>

                                {/* Share buttons */}
                                <p className="text-gray-600 font-medium mb-3">Partager mon score :</p>
                                <div className="flex flex-col sm:flex-row gap-3 justify-center">
                                    <button onClick={shareOnWhatsApp}
                                            className="flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-5 rounded-lg transition-colors">
                                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
